# RustChain Miner Docker Compose Configuration
#
# IMPORTANT: Docker miners earn minimal rewards (1 billionth of normal)
# due to RustChain's anti-VM detection in Proof-of-Antiquity consensus.
#
# For maximum rewards, run the miner on:
# - Bare metal vintage hardware (PowerPC G4: 2.5x multiplier)
# - Physical x86_64 machines (1.0x multiplier)
#
# This Docker setup is provided for:
# - Development and testing
# - Understanding the miner architecture
# - Running in environments where bare metal isn't available

version: '3.8'

services:
  rustchain-miner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustchain-miner

    # Required for hardware fingerprinting (dmidecode access)
    # Note: Even with privileged mode, VMs are detected and earn minimal rewards
    privileged: true

    environment:
      # REQUIRED: Set your wallet name
      - WALLET_NAME=${WALLET_NAME:-my-docker-miner}

      # OPTIONAL: Custom node URL (defaults to https://rustchain.org)
      - NODE_URL=${NODE_URL:-https://rustchain.org}

      # Python unbuffered output for real-time logs
      - PYTHONUNBUFFERED=1

    # Restart policy
    restart: unless-stopped

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "https://rustchain.org/health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

# Networks (optional)
networks:
  default:
    name: rustchain-network
