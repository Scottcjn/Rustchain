    # NOTE: nginx child location `add_header` directives shadow the server-level
    # security headers (HSTS, Permissions-Policy, CSP, X-XSS-Protection,
    # Referrer-Policy). We repeat the full set from the server scope here so
    # /pending/ keeps the same security posture as /wallet/ and the rest of
    # the rustchain.org production site. Mirrors qingfeng312 review on
    # PR #7435 (2026-06-14T01:49:48Z).
    location /pending/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-RustChain "Proof-of-Antiquity" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://rustchain.org https://api.github.com https://50.28.86.131 https://swarmhub.onrender.com; object-src 'none'; base-uri 'self'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Admin-Key" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }


    # Lottery eligibility
    location /lottery/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-RustChain "Proof-of-Antiquity" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://rustchain.org https://api.github.com https://50.28.86.131 https://swarmhub.onrender.com; object-src 'none'; base-uri 'self'" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Agent Economy endpoints (RIP-302)
    location /agent/stats {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-RustChain "Proof-of-Antiquity" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /agent/jobs {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-RustChain "Proof-of-Antiquity" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Ergo Anchors endpoints
    location = /anchors {
        proxy_pass http://127.0.0.1:8099/anchors;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /anchor/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-RustChain "Proof-of-Antiquity" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }



    # BCOS v2 attestation registry (verify, attest, directory, cert, badge).
    # ^~ so the badge SVG is proxied here and not captured by the static
    # "\.svg$" regex location above (regex locations outrank plain prefixes).
    # Without this block the routes 404 on rustchain.org even though the node
    # serves them, because the catch-all below falls through to try_files.
    location ^~ /bcos/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # BCOS on-chain anchor API (/api/v1/bcos/anchor and friends).
    location /api/v1/bcos/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/rustchain-org-access.log;
    error_log /var/log/nginx/rustchain-org-error.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rustchain.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rustchain.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;


}

server {
    listen 80;
    server_name rustchain.org www.rustchain.org;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}
