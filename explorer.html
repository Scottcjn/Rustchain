<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustChain Block Explorer</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #707070;
            --accent-primary: #ff6b35;
            --accent-secondary: #4a9eff;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #ef4444;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 2px solid var(--border);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-primary);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .tab-btn:hover {
            background: var(--accent-secondary);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--accent-primary);
            color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--shadow);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .miners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .miner-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }

        .miner-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
        }

        .miner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .miner-id {
            font-weight: bold;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-online {
            background: var(--success);
            color: var(--bg-primary);
        }

        .status-offline {
            background: var(--danger);
            color: var(--text-primary);
        }

        .arch-badge {
            display: inline-block;
            padding: 3px 8px;
            background: var(--bg-tertiary);
            color: var(--accent-secondary);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 5px 5px 0 0;
        }

        .miner-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .miner-stat {
            text-align: center;
        }

        .miner-stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent-primary);
        }

        .miner-stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .jobs-table {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            background: var(--bg-tertiary);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
        }

        .table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .table tr:hover {
            background: var(--bg-tertiary);
        }

        .wallet-search {
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .search-btn {
            background: var(--accent-primary);
            color: var(--text-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .search-btn:hover {
            background: #e55a2b;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: var(--danger);
            color: var(--text-primary);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .epoch-timeline {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .epoch-item {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-primary);
        }

        .epoch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .epoch-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-primary);
        }

        .epoch-time {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .logo {
                font-size: 2rem;
            }

            .nav-tabs {
                justify-content: center;
            }

            .search-form {
                flex-direction: column;
            }

            .miner-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">RustChain Explorer</div>
            <div class="subtitle">Real-time blockchain dashboard and miner network</div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('overview')">Overview</button>
            <button class="tab-btn" onclick="showTab('miners')">Miners</button>
            <button class="tab-btn" onclick="showTab('agents')">Agent Economy</button>
            <button class="tab-btn" onclick="showTab('wallet')">Wallet Lookup</button>
            <button class="tab-btn" onclick="showTab('epochs')">Epoch History</button>
        </nav>

        <div id="overview" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-miners">-</div>
                    <div class="stat-label">Total Miners</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-miners">-</div>
                    <div class="stat-label">Active Miners</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="current-epoch">-</div>
                    <div class="stat-label">Current Epoch</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-jobs">-</div>
                    <div class="stat-label">Agent Jobs</div>
                </div>
            </div>
        </div>

        <div id="miners" class="tab-content">
            <div id="miners-loading" class="loading">Loading miners...</div>
            <div id="miners-grid" class="miners-grid" style="display: none;"></div>
        </div>

        <div id="agents" class="tab-content">
            <div id="agents-loading" class="loading">Loading agent economy...</div>
            <div id="agents-content" style="display: none;">
                <div class="jobs-table">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Job ID</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Reward</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody id="jobs-tbody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="wallet" class="tab-content">
            <div class="wallet-search">
                <form class="search-form" onsubmit="searchWallet(event)">
                    <input type="text" class="search-input" id="wallet-input" placeholder="Enter wallet address or miner ID" required>
                    <button type="submit" class="search-btn">Search</button>
                </form>
            </div>
            <div id="wallet-results"></div>
        </div>

        <div id="epochs" class="tab-content">
            <div id="epochs-loading" class="loading">Loading epoch history...</div>
            <div id="epochs-timeline" class="epoch-timeline" style="display: none;"></div>
        </div>
    </div>

    <script>
        let refreshInterval;
        let currentTab = 'overview';

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            currentTab = tabName;

            if (refreshInterval) {
                clearInterval(refreshInterval);
            }

            switch(tabName) {
                case 'overview':
                    loadOverview();
                    refreshInterval = setInterval(loadOverview, 30000);
                    break;
                case 'miners':
                    loadMiners();
                    refreshInterval = setInterval(loadMiners, 30000);
                    break;
                case 'agents':
                    loadAgents();
                    refreshInterval = setInterval(loadAgents, 60000);
                    break;
                case 'epochs':
                    loadEpochs();
                    break;
            }
        }

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`https://explorer.rustchain.org/api${endpoint}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`API Error (${endpoint}):`, error);
                throw error;
            }
        }

        async function loadOverview() {
            try {
                const [miners, epoch, agentStats] = await Promise.all([
                    fetchAPI('/miners'),
                    fetchAPI('/epoch'),
                    fetchAPI('/agent/stats')
                ]);

                const activeMinerCount = miners.filter(m => {
                    const lastSeen = new Date(m.last_attestation);
                    const now = new Date();
                    return (now - lastSeen) < 5 * 60 * 1000; // 5 minutes
                }).length;

                document.getElementById('total-miners').textContent = miners.length;
                document.getElementById('active-miners').textContent = activeMinerCount;
                document.getElementById('current-epoch').textContent = epoch.current_epoch || '-';
                document.getElementById('total-jobs').textContent = agentStats.total_jobs || 0;
            } catch (error) {
                console.error('Failed to load overview:', error);
            }
        }

        async function loadMiners() {
            const loading = document.getElementById('miners-loading');
            const grid = document.getElementById('miners-grid');

            try {
                loading.style.display = 'block';
                grid.style.display = 'none';

                const miners = await fetchAPI('/miners');

                grid.innerHTML = miners.map(miner => {
                    const lastSeen = new Date(miner.last_attestation);
                    const now = new Date();
                    const minutesAgo = Math.floor((now - lastSeen) / 60000);
                    const isOnline = minutesAgo < 5;

                    return `
                        <div class="miner-card">
                            <div class="miner-header">
                                <div class="miner-id">${miner.id.substring(0, 16)}...</div>
                                <div class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">
                                    ${isOnline ? 'Online' : 'Offline'}
                                </div>
                            </div>
                            <div class="arch-badge">${miner.architecture || 'Unknown'}</div>
                            <div class="miner-stats">
                                <div class="miner-stat">
                                    <div class="miner-stat-value">${miner.antiquity_multiplier || 1.0}x</div>
                                    <div class="miner-stat-label">Antiquity</div>
                                </div>
                                <div class="miner-stat">
                                    <div class="miner-stat-value">${minutesAgo}m</div>
                                    <div class="miner-stat-label">Last Seen</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                loading.style.display = 'none';
                grid.style.display = 'grid';
            } catch (error) {
                loading.innerHTML = '<div class="error">Failed to load miners</div>';
            }
        }

        async function loadAgents() {
            const loading = document.getElementById('agents-loading');
            const content = document.getElementById('agents-content');
            const tbody = document.getElementById('jobs-tbody');

            try {
                loading.style.display = 'block';
                content.style.display = 'none';

                const jobs = await fetchAPI('/agent/jobs');

                tbody.innerHTML = jobs.slice(0, 20).map(job => `
                    <tr>
                        <td>${job.id ? job.id.substring(0, 8) : 'N/A'}</td>
                        <td>${job.type || 'Unknown'}</td>
                        <td>${job.status || 'Pending'}</td>
                        <td>${job.reward || 0} RTC</td>
                        <td>${job.created ? new Date(job.created).toLocaleString() : 'N/A'}</td>
                    </tr>
                `).join('');

                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (error) {
                loading.innerHTML = '<div class="error">Failed to load agent jobs</div>';
            }
        }

        async function loadEpochs() {
            const loading = document.getElementById('epochs-loading');
            const timeline = document.getElementById('epochs-timeline');

            try {
                loading.style.display = 'block';
                timeline.style.display = 'none';

                const epoch = await fetchAPI('/epoch');

                // Generate mock epoch history for demo
                const epochs = [];
                const currentEpoch = epoch.current_epoch || 1;
                for (let i = 0; i < 10; i++) {
                    const epochNum = currentEpoch - i;
                    if (epochNum <= 0) break;

                    epochs.push({
                        number: epochNum,
                        timestamp: new Date(Date.now() - i * 3600000), // 1 hour intervals
                        blocks: Math.floor(Math.random() * 50) + 10,
                        miners: Math.floor(Math.random() * 20) + 5
                    });
                }

                timeline.innerHTML = epochs.map(ep => `
                    <div class="epoch-item">
                        <div class="epoch-header">
                            <div class="epoch-number">Epoch ${ep.number}</div>
                            <div class="epoch-time">${ep.timestamp.toLocaleString()}</div>
                        </div>
                        <div>Blocks: ${ep.blocks} | Active Miners: ${ep.miners}</div>
                    </div>
                `).join('');

                loading.style.display = 'none';
                timeline.style.display = 'flex';
            } catch (error) {
                loading.innerHTML = '<div class="error">Failed to load epoch history</div>';
            }
        }

        async function searchWallet(event) {
            event.preventDefault();
            const input = document.getElementById('wallet-input');
            const results = document.getElementById('wallet-results');
            const query = input.value.trim();

            if (!query) return;

            results.innerHTML = '<div class="loading">Searching...</div>';

            try {
                // Try to find miner by ID first
                const miners = await fetchAPI('/miners');
                const miner = miners.find(m => m.id.includes(query));

                if (miner) {
                    const lastSeen = new Date(miner.last_attestation);
                    const isOnline = (Date.now() - lastSeen) < 5 * 60 * 1000;

                    results.innerHTML = `
                        <div class="miner-card">
                            <div class="miner-header">
                                <div class="miner-id">${miner.id}</div>
                                <div class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">
                                    ${isOnline ? 'Online' : 'Offline'}
                                </div>
                            </div>
                            <div class="arch-badge">${miner.architecture || 'Unknown'}</div>
                            <div class="miner-stats">
                                <div class="miner-stat">
                                    <div class="miner-stat-value">${miner.antiquity_multiplier || 1.0}x</div>
                                    <div class="miner-stat-label">Antiquity</div>
                                </div>
                                <div class="miner-stat">
                                    <div class="miner-stat-value">${lastSeen.toLocaleString()}</div>
                                    <div class="miner-stat-label">Last Attestation</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    results.innerHTML = '<div class="error">No miner found with that ID</div>';
                }
            } catch (error) {
                results.innerHTML = '<div class="error">Search failed</div>';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadOverview();
            refreshInterval = setInterval(loadOverview, 30000);
        });
    </script>
</body>
</html>
