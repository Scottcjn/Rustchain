<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustChain Explorer - Miner Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --accent-gold: #f39c12;
            --accent-blue: #00d9ff;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --success: #00c853;
            --offline: #ff5252;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--accent-gold);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid var(--accent-gold);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-gold);
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 20px;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .refresh-btn {
            background: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
        
        .miners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .miner-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .miner-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.2);
        }
        
        .miner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .miner-name {
            font-weight: bold;
            font-size: 1.1rem;
            word-break: break-all;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-online {
            background: rgba(0, 200, 83, 0.2);
            color: var(--success);
        }
        
        .status-offline {
            background: rgba(255, 82, 82, 0.2);
            color: var(--offline);
        }
        
        .miner-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .detail-item {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 5px;
        }
        
        .detail-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }
        
        .detail-value {
            font-weight: bold;
            font-size: 0.95rem;
        }
        
        .multiplier-gold { color: var(--accent-gold); }
        .multiplier-silver { color: #c0c0c0; }
        .multiplier-bronze { color: #cd7f32; }
        .multiplier-normal { color: var(--accent-blue); }
        
        .arch-badge {
            display: inline-block;
            background: var(--bg-card);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
        }
        
        .last-update {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-gold);
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .stats-bar { grid-template-columns: 1fr 1fr; }
            .miners-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⛏️ RustChain Miner Dashboard</h1>
            <p class="subtitle">Real-time Proof-of-Antiquity Network Status</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalMiners">-</div>
                <div class="stat-label">Active Miners</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="vintageMiners">-</div>
                <div class="stat-label">Vintage Hardware</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgMultiplier">-</div>
                <div class="stat-label">Avg. Multiplier</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="epochReward">1.5</div>
                <div class="stat-label">RTC/Epoch</div>
            </div>
        </div>
        
        <h2 class="section-title">
            👨‍🏭 Active Miners
            <button class="refresh-btn" onclick="fetchMiners()">🔄 Refresh</button>
        </h2>
        
        <div id="minersContainer">
            <div class="loading">Loading miners...</div>
        </div>
        
        <div class="last-update">
            Last updated: <span id="lastUpdate">-</span> | Auto-refresh: 30s
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://explorer.rustchain.org';
        let miners = [];
        
        async function fetchMiners() {
            const container = document.getElementById('minersContainer');
            container.innerHTML = '<div class="loading">Loading miners...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/miners`);
                miners = await response.json();
                renderMiners();
                updateStats();
            } catch (error) {
                container.innerHTML = `<div class="loading" style="color: var(--offline)">Error loading miners: ${error.message}</div>`;
            }
        }
        
        function renderMiners() {
            const container = document.getElementById('minersContainer');
            
            if (!miners || miners.length === 0) {
                container.innerHTML = '<div class="loading">No miners found</div>';
                return;
            }
            
            // Sort by multiplier (highest first)
            const sorted = [...miners].sort((a, b) => b.antiquity_multiplier - a.antiquity_multiplier);
            
            container.innerHTML = `
                <div class="miners-grid">
                    ${sorted.map(miner => renderMinerCard(miner)).join('')}
                </div>
            `;
        }
        
        function renderMinerCard(miner) {
            const isOnline = isRecentlyActive(miner.last_attest);
            const multiplierClass = getMultiplierClass(miner.antiquity_multiplier);
            const multiplier = miner.antiquity_multiplier.toFixed(1);
            
            const lastAttest = miner.last_attest ? new Date(miner.last_attest * 1000).toLocaleString() : 'N/A';
            const arch = miner.device_arch || 'Unknown';
            const family = miner.device_family || miner.hardware_type || 'Unknown';
            
            return `
                <div class="miner-card">
                    <div class="miner-header">
                        <span class="miner-name">${escapeHtml(miner.miner)}</span>
                        <span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">
                            ${isOnline ? '🟢 Online' : '🔴 Offline'}
                        </span>
                    </div>
                    <div class="miner-details">
                        <div class="detail-item">
                            <div class="detail-label">Architecture</div>
                            <div class="detail-value">
                                <span class="arch-badge">${escapeHtml(arch.substring(0, 15))}</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Multiplier</div>
                            <div class="detail-value ${multiplierClass}">${multiplier}x</div>
                        </div>
                        <div class="detail-item" style="grid-column: 1 / -1;">
                            <div class="detail-label">Hardware</div>
                            <div class="detail-value">${escapeHtml(family)}</div>
                        </div>
                        <div class="detail-item" style="grid-column: 1 / -1;">
                            <div class="detail-label">Last Attestation</div>
                            <div class="detail-value">${lastAttest}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function isRecentlyActive(lastAttest) {
            if (!lastAttest) return false;
            const now = Date.now() / 1000;
            return (now - lastAttest) < 300; // 5 minutes
        }
        
        function getMultiplierClass(multiplier) {
            if (multiplier >= 2.5) return 'multiplier-gold';
            if (multiplier >= 2.0) return 'multiplier-silver';
            if (multiplier >= 1.5) return 'multiplier-bronze';
            return 'multiplier-normal';
        }
        
        function updateStats() {
            document.getElementById('totalMiners').textContent = miners.length;
            
            const vintage = miners.filter(m => m.antiquity_multiplier >= 1.5).length;
            document.getElementById('vintageMiners').textContent = vintage;
            
            const avg = miners.reduce((sum, m) => sum + m.antiquity_multiplier, 0) / miners.length;
            document.getElementById('avgMultiplier').textContent = avg.toFixed(2) + 'x';
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initial load
        fetchMiners();
        
        // Auto-refresh every 30 seconds
        setInterval(fetchMiners, 30000);
    </script>
</body>
</html>
