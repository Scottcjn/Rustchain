apiVersion: v1
kind: Service
metadata:
  name: rustchain-node
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: node
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: node
  ports:
    - name: dashboard
      port: 8099
      targetPort: dashboard
      protocol: TCP
    - name: api
      port: 8088
      targetPort: api
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: rustchain-node-external
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: node
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: node
  ports:
    - name: dashboard
      port: 8099
      targetPort: dashboard
      nodePort: 30099
      protocol: TCP
    - name: api
      port: 8088
      targetPort: api
      nodePort: 30088
      protocol: TCP
