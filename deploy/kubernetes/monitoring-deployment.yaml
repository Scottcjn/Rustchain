apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustchain-monitoring
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rustchain
      app.kubernetes.io/component: monitoring
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustchain
        app.kubernetes.io/component: monitoring
    spec:
      securityContext:
        fsGroup: 472
      containers:
        # Prometheus
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--web.listen-address=:9090"
          ports:
            - name: prometheus
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: prometheus
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: prometheus
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-data
              mountPath: /prometheus

        # Grafana
        - name: grafana
          image: grafana/grafana:10.4.1
          ports:
            - name: grafana
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: grafana-secrets
          env:
            - name: GF_INSTALL_PLUGINS
              value: ""
          livenessProbe:
            httpGet:
              path: /api/health
              port: grafana
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: grafana
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: grafana-datasource.yml

      volumes:
        - name: prometheus-config
          configMap:
            name: rustchain-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: grafana-datasource
          configMap:
            name: rustchain-config
            items:
              - key: grafana-datasource.yml
                path: grafana-datasource.yml
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data-pvc
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data-pvc
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rustchain-prometheus
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
  ports:
    - name: prometheus
      port: 9090
      targetPort: prometheus
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: rustchain-grafana
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: monitoring
  ports:
    - name: grafana
      port: 3000
      targetPort: grafana
      protocol: TCP
