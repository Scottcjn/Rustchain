apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rustchain

commonLabels:
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - node-deployment.yaml
  - node-service.yaml
  - monitoring-deployment.yaml
  - ingress.yaml

images:
  - name: rustchain/node
    newTag: latest
