apiVersion: v1
kind: ConfigMap
metadata:
  name: rustchain-config
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: node
data:
  RUSTCHAIN_HOME: "/rustchain"
  RUSTCHAIN_DB: "/rustchain/data/rustchain_v2.db"
  DOWNLOAD_DIR: "/rustchain/downloads"
  PYTHONUNBUFFERED: "1"
  # Node networking
  NODE_HOST: "0.0.0.0"
  NODE_PORT: "8099"
  API_PORT: "8088"
  # Logging
  LOG_LEVEL: "INFO"
  # Prometheus exporter
  RUSTCHAIN_NODE: "http://rustchain-node:8099"
  EXPORTER_PORT: "9100"
  SCRAPE_INTERVAL: "30"
  TLS_VERIFY: "false"
  # Prometheus config
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    scrape_configs:
      - job_name: 'rustchain-exporter'
        static_configs:
          - targets: ['localhost:9100']
      - job_name: 'rustchain-node'
        metrics_path: /metrics
        static_configs:
          - targets: ['rustchain-node:8099']
    alerting:
      alertmanagers:
        - static_configs:
            - targets: []
  # Grafana datasource provisioning
  grafana-datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://localhost:9090
        isDefault: true
        editable: false
