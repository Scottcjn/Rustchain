apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustchain-ingress
  namespace: rustchain
  labels:
    app.kubernetes.io/name: rustchain
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Security headers
    nginx.ingress.kubernetes.io/server-snippets: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # TLS via cert-manager (uncomment when cert-manager is installed)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rustchain.example.com
      secretName: rustchain-tls
  rules:
    - host: rustchain.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustchain-node
                port:
                  name: dashboard
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rustchain-node
                port:
                  name: api
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: rustchain-grafana
                port:
                  name: grafana
