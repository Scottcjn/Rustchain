upstream rustchain_node {
    server 127.0.0.1:8088;
}

upstream rustchain_dashboard {
    server 127.0.0.1:8099;
}

server {
    listen 80;
    server_name rustchain.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rustchain.example.com;

    ssl_certificate /etc/letsencrypt/live/rustchain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rustchain.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API
    location /api/ {
        proxy_pass http://rustchain_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Dashboard
    location / {
        proxy_pass http://rustchain_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block explorer
    location /explorer {
        alias /opt/rustchain/explorer;
        try_files $uri $uri/ /explorer/index.html;
    }
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
