# Canonical /api/v1 read API — add to BOTH the rustchain.org and
# explorer.rustchain.org server blocks so the canonical read paths reported in
# #7251/#7252/#7297-#7307 resolve to the backend instead of returning nginx 404.
#
# After adding:  sudo nginx -t && sudo systemctl reload nginx
#
location /api/v1/ {
    proxy_pass http://127.0.0.1:8099;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
