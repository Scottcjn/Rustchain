name: RTC Auto-Pay on PR Merge

# FIX: was `on: pull_request: [closed]`, which does NOT receive repo secrets for
# fork PRs (GitHub security) — external contributors' payouts silently failed.
# `push: [main]` runs after merge, in the trusted base context, WITH secrets, on
# already-merged code. (Not pull_request_target — that runs untrusted PR code
# with secrets.) PR number/author resolved from the merge commit.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-pay:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve merged PR from the pushed commit
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_json=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            -H "Accept: application/vnd.github+json" 2>/dev/null || echo '[]')
          echo "number=$(echo "$pr_json" | jq -r '.[0].number // empty')" >> "$GITHUB_OUTPUT"
          echo "author=$(echo "$pr_json" | jq -r '.[0].user.login // empty')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.pr.outputs.number != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.pr.outputs.number != ''
        run: pip install requests

      - name: Run RTC Auto-Pay
        if: steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          RTC_VPS_HOST: ${{ secrets.RTC_VPS_HOST }}
          RTC_ADMIN_KEY: ${{ secrets.RTC_ADMIN_KEY }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: python scripts/auto-pay.py
