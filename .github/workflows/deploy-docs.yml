name: Deploy Docs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          cargo build --release

      - name: Deploy docs
        run: |
          # Deploy the documentation to the desired location
          # For demonstration purposes, assume we have a script `deploy_docs.sh` that deploys the documentation
          ./deploy_docs.sh