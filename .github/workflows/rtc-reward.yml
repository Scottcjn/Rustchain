name: RTC Reward on PR Merge

# Flat reward for light/simple contributions (stars, docs, small repo bounties),
# matching the proven pattern already live in Scottcjn/bottube and rustchain-mcp.
# pull_request_target runs in the base-repo context WITH secret access (so fork
# PRs are paid too), and uses the FIRST-PARTY rustchain-bounties/actions/rtc-reward
# action (not a third-party one). Best-effort: never gates CI.
#
# Variable / large bounties are NOT handled here — those go through owner-directed
# claim PRs in Scottcjn/rustchain-bounties (auto-pay.py).
on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write  # required for auto-pay's Git ref mutex
  issues: write
  pull-requests: write

jobs:
  reward:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Award RTC to contributor
        continue-on-error: true  # rewards are best-effort; never gate CI
        uses: Scottcjn/rustchain-bounties/actions/rtc-reward@main
        env:
          # The action reads GITHUB_TOKEN from env; without this it crashed on
          # every merge ("Error: GITHUB_TOKEN not set") and paid no one, masked
          # by continue-on-error. Pass the workflow token explicitly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          node-url: https://rustchain.org
          amount: 5
          wallet-from: founder_community
          admin-key: ${{ secrets.RTC_ADMIN_KEY }}
