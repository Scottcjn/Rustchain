name: RustChain Ledger Verification

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger
  push:
    paths:
      - 'monitoring/ledger_verify.py'
      - '.github/workflows/ledger-verify.yml'

jobs:
  verify:
    name: Cross-Node Ledger Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ledger Verification (CI mode)
        run: python3 monitoring/ledger_verify.py --ci
        env:
          PYTHONUNBUFFERED: '1'
        continue-on-error: true
        id: verify

      - name: Post webhook on mismatch
        if: steps.verify.outcome == 'failure' && env.MISMATCH_WEBHOOK != ''
        run: python3 monitoring/ledger_verify.py --ci --webhook "$MISMATCH_WEBHOOK"
        env:
          MISMATCH_WEBHOOK: ${{ secrets.RUSTCHAIN_MISMATCH_WEBHOOK }}

      - name: Upload verification history
        uses: actions/upload-artifact@v4
        with:
          name: ledger-verify-db-${{ github.run_id }}
          path: ~/.rustchain/ledger_verify.db
          retention-days: 30
        if: always()

      - name: Fail job on mismatch
        if: steps.verify.outcome == 'failure'
        run: exit 1
