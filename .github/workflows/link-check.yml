name: Link Check

on:
  push:
    paths:
      - '**.md'
      - '**.html'
  pull_request:
    paths:
      - '**.md'
      - '**.html'
  schedule:
    - cron: '0 8 * * 1'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lychee
        run: |
          curl -sSL https://github.com/lycheeverse/lychee/releases/download/lychee-v0.17.0/lychee-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv lychee-x86_64-unknown-linux-gnu/lychee /usr/local/bin/
          lychee --version

      - name: Check links
        run: |
          lychee \
            --base . \
            --no-progress \
            --max-retries 2 \
            --timeout 30 \
            --accept 200,204,301,302,304,429 \
            '**/*.md' \
            --exclude 'https://twitter.com/*' \
            --exclude 'https://x.com/*' \
            --exclude 'https://t.me/*' \
            --exclude 'https://discord.gg/*' \
            --exclude 'https://doi.org/*' \
            --exclude 'https://img.shields.io/*' \
            --exclude 'https://raw.githubusercontent.com/*'
