# RustChain TESTNET — public reverse proxy
# =========================================
# Deploy on a host WITH a public IP + TLS (e.g. Node 1, 50.28.86.131).
# It proxies the public testnet endpoint to the POWER8 node over Tailscale,
# so the heavy/attackable node stays on the big-RAM box while the public edge
# is the hardened VPS.
#
# Prereqs on the proxy host:
#   - tailscale up (can reach the POWER8 tailscale IP)
#   - TLS cert for the chosen hostname (certbot) — or reuse an existing one
#
# Replace:
#   POWER8_TS_IP   -> POWER8 tailscale IP (e.g. 100.75.100.89)
#   testnet.rustchain.example -> your chosen hostname (or use a path on an existing host)

upstream rustchain_testnet_node  { server POWER8_TS_IP:8198; }
upstream rustchain_testnet_faucet { server POWER8_TS_IP:8190; }

server {
    listen 443 ssl;
    server_name testnet.rustchain.example;

    # ssl_certificate     /etc/letsencrypt/live/testnet.rustchain.example/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/testnet.rustchain.example/privkey.pem;

    # Loud banner header so nobody confuses test-RTC with real RTC.
    add_header X-RustChain-Network "TESTNET" always;

    location /faucet {
        proxy_pass http://rustchain_testnet_faucet;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://rustchain_testnet_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}

# --- Alternative: no spare hostname? Expose under a path on an existing TLS host ---
#   location /testnet/      { proxy_pass http://POWER8_TS_IP:8198/; ... }
#   location /testnet/faucet { proxy_pass http://POWER8_TS_IP:8190/faucet; ... }
