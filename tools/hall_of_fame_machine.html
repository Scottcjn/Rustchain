<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Profile - Hall of Fame | RustChain</title>
    <style>
        /* CRT Terminal Aesthetic */
        :root {
            --crt-bg: #0a0a0f;
            --crt-green: #00ff41;
            --crt-amber: #ffb000;
            --crt-red: #ff0040;
            --crt-dim: #1a1a2e;
            --crt-glow: 0 0 10px currentColor;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--crt-bg);
            color: var(--crt-green);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            text-shadow: var(--crt-glow);
        }
        
        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            border-bottom: 2px solid var(--crt-green);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .back-link {
            color: var(--crt-amber);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-shadow: 0 0 20px var(--crt-amber);
        }
        
        /* Machine Profile Card */
        .machine-card {
            background: var(--crt-dim);
            border: 2px solid var(--crt-green);
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
        }
        
        .machine-card.deceased {
            border-color: #666;
            color: #888;
            filter: grayscale(100%);
            opacity: 0.8;
        }
        
        .machine-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }
        
        .machine-name {
            font-size: 28px;
            font-weight: bold;
        }
        
        .machine-nickname {
            color: var(--crt-amber);
            font-style: italic;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border: 2px solid currentColor;
            font-size: 18px;
        }
        
        /* ASCII Silhouette */
        .silhouette {
            font-family: monospace;
            white-space: pre;
            line-height: 1.2;
            color: var(--crt-green);
            margin: 20px 0;
            text-align: center;
        }
        
        .machine-card.deceased .silhouette {
            color: #666;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-box {
            border: 1px solid var(--crt-green);
            padding: 15px;
            text-align: center;
        }
        
        .machine-card.deceased .stat-box {
            border-color: #666;
        }
        
        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        /* Warning boxes */
        .warning {
            border: 2px solid var(--crt-red);
            padding: 15px;
            margin: 20px 0;
            background: rgba(255, 0, 64, 0.1);
        }
        
        .warning-title {
            color: var(--crt-red);
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        /* Timeline */
        .timeline {
            margin-top: 30px;
        }
        
        .timeline h3 {
            border-bottom: 1px solid var(--crt-green);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .machine-card.deceased .timeline h3 {
            border-color: #666;
        }
        
        .timeline-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed var(--crt-green);
        }
        
        .machine-card.deceased .timeline-item {
            border-color: #666;
        }
        
        /* Memorial styling */
        .memorial-banner {
            background: linear-gradient(90deg, transparent, #333, transparent);
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            font-style: italic;
            color: #888;
        }
        
        /* Loading state */
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .loading::after {
            content: '...';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Error state */
        .error {
            border: 2px solid var(--crt-red);
            padding: 30px;
            text-align: center;
            color: var(--crt-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ HALL OF FAME - MACHINE PROFILE</h1>
            <a href="/hall-of-fame/" class="back-link">← Back to Leaderboard</a>
        </div>
        
        <div id="machine-profile">
            <div class="loading">Loading machine data</div>
        </div>
    </div>
    
    <script>
        // Get machine ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const machineId = urlParams.get('machine') || urlParams.get('id');
        
        async function loadMachineProfile() {
            const container = document.getElementById('machine-profile');
            
            if (!machineId) {
                container.innerHTML = `
                    <div class="error">
                        <h2>ERROR: No Machine ID</h2>
                        <p>Please provide a machine fingerprint hash.</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`/api/hall_of_fame/machine?id=${machineId}`);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Machine not found');
                }
                
                renderMachineProfile(data.data);
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <h2>ERROR: ${error.message}</h2>
                        <p>Could not load machine profile.</p>
                    </div>
                `;
            }
        }
        
        function renderMachineProfile(machine) {
            const container = document.getElementById('machine-profile');
            const isDeceased = machine.is_deceased;
            
            const html = `
                <div class="machine-card ${isDeceased ? 'deceased' : ''}">
                    ${isDeceased ? `
                        <div class="memorial-banner">
                            ⚰️ IN MEMORIAM - This machine has passed into the great bit bucket in the sky ⚰️
                        </div>
                    ` : ''}
                    
                    <div class="machine-header">
                        <div>
                            <div class="machine-name">${machine.device_model || 'Unknown Machine'}</div>
                            ${machine.nickname ? `<div class="machine-nickname">"${machine.nickname}"</div>
                            ` : ''}
                        </div>
                        <div class="badge" style="color: ${machine.badge.color}">
                            ${machine.badge.icon} ${machine.badge.tier}
                        </div>
                    </div>
                    
                    <div class="silhouette">${machine.ascii_silhouette}</div>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Rust Score</div>
                            <div class="stat-value" style="color: ${machine.badge.color}">${machine.rust_score.toFixed(1)}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Total Attestations</div>
                            <div class="stat-value">${machine.total_attestations.toLocaleString()}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Age</div>
                            <div class="stat-value">${machine.age_years ? machine.age_years + ' years' : 'Unknown'}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Architecture</div>
                            <div class="stat-value">${machine.device_arch}</div>
                        </div>
                    </div>
                    
                    ${machine.capacitor_plague ? `
                    <div class="warning">
                        <div class="warning-title">⚠️ CAPACITOR PLAGUE DETECTED</div>
                        <p>This machine has shown signs of capacitor failure. Monitor closely.</p>
                    </div>
                    ` : ''}
                    
                    ${machine.thermal_events > 0 ? `
                    <div class="warning">
                        <div class="warning-title">🌡️ THERMAL EVENTS: ${machine.thermal_events}</div>
                        <p>History of overheating detected.</p>
                    </div>
                    ` : ''}
                    
                    <div class="timeline">
                        <h3>📊 ATTESTATION TIMELINE (Last 30 Days)</h3>
                        ${machine.attestation_timeline.length > 0 ? `
                            ${machine.attestation_timeline.map(item => `
                                <div class="timeline-item">
                                    <span>${item.date}</span>
                                    <span>${item.attestations} attestations</span>
                                </div>
                            `).join('')}
                        ` : '<p>No recent attestations</p>'}
                    </div>
                    
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid currentColor;">
                        <div class="stat-label">OPERATOR</div>
                        <div style="font-size: 18px;">${machine.miner_id}</div>
                        <div style="margin-top: 15px; font-size: 12px; opacity: 0.7;">
                            First Attestation: ${machine.first_attestation ? new Date(machine.first_attestation).toLocaleDateString() : 'Unknown'}<br>
                            Last Attestation: ${machine.last_attestation ? new Date(machine.last_attestation).toLocaleDateString() : 'Unknown'}<br>
                            Fingerprint: ${machine.fingerprint_hash}
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // Load on page load
        loadMachineProfile();
    </script>
</body>
</html>
