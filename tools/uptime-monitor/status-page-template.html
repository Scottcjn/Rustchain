<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RustChain Network Status</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e5e9;
            --text-muted: #8b8d97;
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.1);
            --yellow: #eab308;
            --yellow-bg: rgba(234, 179, 8, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --accent: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--accent);
        }

        .overall-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .overall-status.operational {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .overall-status.degraded {
            background: var(--yellow-bg);
            color: var(--yellow);
            border: 1px solid rgba(234, 179, 8, 0.25);
        }

        .overall-status.down {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .overall-status::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .node-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        .node-card:hover {
            border-color: var(--accent);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .node-name {
            font-weight: 600;
            font-size: 0.95rem;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            color: var(--text);
        }

        .status-badge {
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.2rem 0.75rem;
            border-radius: 9999px;
        }

        .status-badge.operational {
            background: var(--green-bg);
            color: var(--green);
        }

        .status-badge.degraded {
            background: var(--yellow-bg);
            color: var(--yellow);
        }

        .status-badge.down {
            background: var(--red-bg);
            color: var(--red);
        }

        .sparkline {
            display: flex;
            gap: 1px;
            height: 32px;
            margin: 0.75rem 0;
            align-items: stretch;
        }

        .bar {
            flex: 1;
            border-radius: 2px;
            min-width: 2px;
            transition: opacity 0.15s;
            cursor: default;
        }

        .bar:hover { opacity: 0.75; }

        .bar-up { background: var(--green); }
        .bar-down { background: var(--red); }

        .node-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .node-stats b {
            color: var(--text);
            font-weight: 600;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container { padding: 1.25rem 1rem; }
            .node-stats { gap: 1rem; }
            .node-name { font-size: 0.82rem; word-break: break-all; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>RustChain</span> Network Status</h1>
            <div class="overall-status {{OVERALL_CLASS}}">{{OVERALL_STATUS}}</div>
        </header>

        {{NODE_ROWS}}

        <footer>
            Last updated: {{GENERATED}}<br>
            Powered by <a href="https://github.com/Scottcjn/Rustchain">RustChain</a>
        </footer>
    </div>
</body>
</html>
