<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miner Dashboard | RustChain</title>
    <style>
        :root { --crt-bg: #0a0a0f; --crt-green: #00ff41; --crt-amber: #ffb000; --crt-dim: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--crt-bg); color: var(--crt-green); font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { border-bottom: 2px solid var(--crt-green); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; }
        .miner-input { background: var(--crt-dim); border: 2px solid var(--crt-green); padding: 30px; margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; background: var(--crt-bg); border: 1px solid var(--crt-green); color: var(--crt-green); padding: 12px; font-family: inherit; }
        .input-group button { background: var(--crt-green); color: var(--crt-bg); border: none; padding: 12px 30px; font-family: inherit; font-weight: bold; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--crt-dim); border: 1px solid var(--crt-green); padding: 20px; }
        .card h3 { border-bottom: 1px solid var(--crt-green); padding-bottom: 10px; margin-bottom: 15px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed rgba(0, 255, 65, 0.3); }
        .stat-value.large { font-size: 24px; color: var(--crt-amber); }
        .loading { text-align: center; padding: 50px; }
        .error { border: 2px solid #ff0040; padding: 30px; text-align: center; color: #ff0040; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ MINER DASHBOARD</h1>
            <div>RustChain Personal Stats & Reward History</div>
        </div>
        
        <div class="miner-input">
            <h2>Enter Miner ID</h2>
            <div class="input-group">
                <input type="text" id="miner-id" placeholder="your-miner-id" value="">
                <button onclick="loadDashboard()">LOAD DASHBOARD</button>
            </div>
        </div>
        
        <div id="dashboard-content"></div>
    </div>
    
    <script>
        const API_BASE = 'https://rustchain.org';
        
        async function loadDashboard() {
            const minerId = document.getElementById('miner-id').value.trim();
            if (!minerId) return alert('Please enter a miner ID');
            
            const container = document.getElementById('dashboard-content');
            container.innerHTML = '<div class="loading">Loading miner data...</div>';
            
            try {
                const [balance, miners, epoch] = await Promise.all([
                    fetch(`${API_BASE}/balance?miner_id=${minerId}`).then(r => r.json()),
                    fetch(`${API_BASE}/api/miners`).then(r => r.json()),
                    fetch(`${API_BASE}/epoch`).then(r => r.json())
                ]);
                
                const miner = miners.find(m => m.miner === minerId);
                if (!miner) throw new Error('Miner not found');
                
                renderDashboard(miner, balance, epoch);
            } catch (err) {
                container.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }
        
        function renderDashboard(miner, balance, epoch) {
            const html = `
                <div class="dashboard">
                    <div class="card">
                        <h3>💰 BALANCE</h3>
                        <div class="stat-row"><span>Current Balance</span><span class="stat-value large">${balance.balance_rtc || 0} RTC</span></div>
                        <div class="stat-row"><span>Miner ID</span><span>${miner.miner}</span></div>
                    </div>
                    <div class="card">
                        <h3>⚙️ HARDWARE</h3>
                        <div class="stat-row"><span>Architecture</span><span>${miner.device_arch}</span></div>
                        <div class="stat-row"><span>Device Family</span><span>${miner.device_family}</span></div>
                        <div class="stat-row"><span>Antiquity Multiplier</span><span>${miner.antiquity_multiplier}x</span></div>
                    </div>
                    <div class="card">
                        <h3>📊 NETWORK</h3>
                        <div class="stat-row"><span>Current Epoch</span><span>${epoch.epoch}</span></div>
                        <div class="stat-row"><span>Slot</span><span>${epoch.slot}/${epoch.blocks_per_epoch}</span></div>
                        <div class="stat-row"><span>Enrolled Miners</span><span>${epoch.enrolled_miners}</span></div>
                    </div>
                </div>
            `;
            document.getElementById('dashboard-content').innerHTML = html;
        }
        
        // Load from URL param
        const urlParams = new URLSearchParams(window.location.search);
        const minerParam = urlParams.get('miner');
        if (minerParam) {
            document.getElementById('miner-id').value = minerParam;
            loadDashboard();
        }
    </script>
</body>
</html>
