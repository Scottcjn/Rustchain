<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RustChain Notification</title>
<style>
  body { margin: 0; padding: 0; background: #f4f4f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  .wrapper { width: 100%; background: #f4f4f7; padding: 24px 0; }
  .container { max-width: 580px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .header { background: #1a1a2e; padding: 24px 32px; text-align: center; }
  .header h1 { margin: 0; color: #e94560; font-size: 22px; letter-spacing: 1px; }
  .header .subtitle { color: #a0a0b0; font-size: 13px; margin-top: 4px; }
  .body { padding: 32px; color: #333; line-height: 1.6; }
  .body h2 { margin-top: 0; color: #1a1a2e; font-size: 18px; }
  .metric-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  .metric-table td { padding: 10px 12px; border-bottom: 1px solid #eee; }
  .metric-table td:first-child { color: #666; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; width: 45%; }
  .metric-table td:last-child { font-weight: 600; color: #1a1a2e; text-align: right; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #d4edda; color: #155724; }
  .badge-red { background: #f8d7da; color: #721c24; }
  .badge-blue { background: #cce5ff; color: #004085; }
  .footer { background: #f4f4f7; padding: 20px 32px; text-align: center; font-size: 12px; color: #999; }
  .footer a { color: #e94560; text-decoration: none; }
  .miner-id { font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 13px; background: #f0f0f5; padding: 2px 8px; border-radius: 4px; word-break: break-all; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="header">
      <h1>RustChain</h1>
      <div class="subtitle">Miner Notification Service</div>
    </div>
    <div class="body">
      $body_content
    </div>
    <div class="footer">
      <p>You are receiving this because you subscribed to RustChain miner notifications.</p>
      <p>$timestamp</p>
    </div>
  </div>
</div>
</body>
</html>
